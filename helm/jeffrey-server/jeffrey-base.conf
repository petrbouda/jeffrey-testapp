# Jeffrey CLI init config used by jeffrey-server's own startup command to
# self-profile. The CLI itself lives in the in-image /jeffrey-libs/ bundle;
# JEFFREY_HOME / JEFFREY_CLI_PATH / JEFFREY_PROFILER_PATH / JEFFREY_AGENT_PATH
# are baked into the image by jeffrey-jib (build/build-server-jib/pom.xml) and
# read by jeffrey-cli when those paths are absent from this file.

project {
    workspace-id = "uat"
    name = "jeffrey-server"
    label = "Jeffrey Server"
}

perf-counters {
    enabled = true
}

heap-dump {
    enabled = true
    type = "crash"
}

jvm-logging {
    enabled = true
    command = "jfr*=trace:file=<<JEFFREY_CURRENT_SESSION>>/jfr-jvm.log::filecount=3,filesize=5m"
}

additional-jvm-options = "-Xmx600m -Xms600m -XX:+UseG1GC -XX:+AlwaysPreTouch -Djeffrey.server.logging.trace-file.path=<<JEFFREY_CURRENT_SESSION>>/jeffrey-app.log"
