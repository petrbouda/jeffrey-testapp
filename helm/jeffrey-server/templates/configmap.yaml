apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jeffrey-server.fullname" . }}-config
  labels:
    {{- include "jeffrey-server.labels" . | nindent 4 }}
data:
  application.properties: |-
{{ .Files.Get "application.properties" | indent 4 }}
  jeffrey-base.conf: |-
{{ tpl (.Files.Get "jeffrey-base.conf") . | indent 4 }}
