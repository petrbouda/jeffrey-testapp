# Jeffrey CLI Init Command Configuration (HOCON).
# Read by `jeffrey-cli init` at container start (invoked by the jeffrey-jib entrypoint
# wrapper). Generated by Jeffrey Server's copy-libs feature populates the shared volume
# at ${jeffrey-home}/libs/current/.

# jeffrey-home, profiler-path, agent-path are intentionally omitted:
# jeffrey-cli reads jeffrey-home from the JEFFREY_HOME env var (set by the
# Deployment from sharedVolume.mountPath), and auto-derives profiler-path /
# agent-path as ${jeffrey-home}/libs/current/{libasyncProfiler.so,jeffrey-agent.jar}.

project {
    workspace-id = "uat"
    name  = ${JEFFREY_TESTAPP_MODE}"-jeffrey-testapp-server"
    label = "Jeffrey TestApp Server ("${JEFFREY_TESTAPP_MODE}")"
}

perf-counters {
    enabled = true
}

heap-dump {
    enabled = true
    type = "crash"
}

jvm-logging {
    enabled = true
    command = "jfr*=trace:file=<<JEFFREY_CURRENT_SESSION>>/jfr-jvm.log::filecount=3,filesize=5m"
}

additional-jvm-options = "-Xmx600m -Xms600m -XX:+UseG1GC -XX:+AlwaysPreTouch"
