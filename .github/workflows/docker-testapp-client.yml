name: Jeffrey TestApp Client Container Image

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: petrbouda/jeffrey-builder:25

    steps:
      - uses: actions/checkout@v4

      # See docker-testapp-server.yml for why we write ~/.docker/config.json directly.
      - name: Configure Docker Hub auth for Jib
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          mkdir -p ~/.docker
          AUTH=$(printf '%s' "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64 | tr -d '\n')
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}\n' "${AUTH}" > ~/.docker/config.json
          chmod 600 ~/.docker/config.json

      - name: Build & push image with Jib
        run: |
          mvn -B -pl client -am -DskipTests compile jib:build \
            -Djib.to.image=petrbouda/jeffrey-testapp-client:${{ github.ref_name }} \
            -Djib.to.tags=latest
