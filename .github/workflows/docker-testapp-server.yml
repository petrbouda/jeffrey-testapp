name: Jeffrey TestApp Server Container Image

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: petrbouda/jeffrey-builder:25

    steps:
      - uses: actions/checkout@v4

      # The petrbouda/jeffrey-builder:25 container has no docker CLI, so
      # docker/login-action can't be used. Write ~/.docker/config.json directly
      # — Jib reads it automatically (same auth scheme `docker login` produces),
      # and the token doesn't leak into the process arg list the way
      # -Djib.to.auth.password=... would.
      - name: Configure Docker Hub auth for Jib
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          mkdir -p ~/.docker
          AUTH=$(printf '%s' "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" | base64 | tr -d '\n')
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}\n' "${AUTH}" > ~/.docker/config.json
          chmod 600 ~/.docker/config.json

      - name: Build & push image with Jib
        run: |
          mvn -B -pl server -am -DskipTests compile jib:build \
            -Djib.to.image=petrbouda/jeffrey-testapp-server:${{ github.ref_name }} \
            -Djib.to.tags=latest
